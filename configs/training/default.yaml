max_epochs: 10
batch_size: 64  # in TRM paper: 768, but we use a smaller batch size to fit the model on GPU; effective batch size can be increased by using gradient accumulation (see accumulate_grad_batches below)
precision: "bf16-mixed" # use 16 for mixed precision training, 32 for full precision; "bf16-mixed"
gradient_clip_val: 1.0
accelerator: "gpu"

monitor_metric: "val/id_loss"
monitor_metric_mode: "min"
id_metric: "val/id_acc"
id_metric_mode: "max"
ood_metric: "val/ood_acc"
ood_metric_mode: "max"

early_stopping: true
patience: 10
save_top_k: 1

ema:
  enabled: false
  decay: 0.999
  cpu_offload: true  # store shadow weights on CPU to avoid doubling GPU memory

check_val_every_n_epoch: 1

accumulate_grad_batches: 1  # gradient accumulation; accumulate gradients over N batches before optimizer step (effective batch size = batch_size * accumulate_grad_batches)

num_workers: 4
devices: 1

use_torch_compile: true  # whether to use torch.compile to speed up training; requires PyTorch 2.0+ and may not be compatible with all model configurations

use_manual_optimization: true  # set to true for models that use manual optimization (e.g., TRM); disables Trainer-level gradient clipping (must be handled in training_step)